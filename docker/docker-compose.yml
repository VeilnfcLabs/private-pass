version: "3.9"

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - VEILPASS_SIGNING_KEY=${VEILPASS_SIGNING_KEY:-}
      - VEILPASS_VERIFICATION_KEY=${VEILPASS_VERIFICATION_KEY:-}
      - VEILPASS_DATABASE_URL=postgresql+asyncpg://veilpass:veilpass@db:5432/veilpass
      - VEILPASS_REDIS_URL=redis://redis:6379/0
      - VEILPASS_RATE_LIMIT=100
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  docs:
    build:
      context: ../apps/docs
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: veilpass
      POSTGRES_PASSWORD: veilpass
      POSTGRES_DB: veilpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veilpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
