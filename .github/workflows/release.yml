# ─────────────────────────────────────────────────────────────────────────────
# VeilPass Release Pipeline
# Triggered by pushing a tag matching v* (e.g., v0.1.0, v1.2.3).
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_OWNER: veillabs

jobs:
  # ── Build Binaries (Rust CLI) ──────────────────────────────────────────────
  build-binaries:
    name: Build CLI binaries (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build -p veilpass-cli --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/vp${{ matrix.suffix }}"
          ARCHIVE_NAME="veilpass-${{ matrix.target }}${{ matrix.suffix }}"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf "${ARCHIVE_NAME}.tar.gz" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          else
            7z a "${ARCHIVE_NAME}.zip" "$BINARY"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: veilpass-${{ matrix.target }}
          path: veilpass-${{ matrix.target }}.*

  # ── Publish CLI to npm ─────────────────────────────────────────────────────
  publish-npm:
    name: Publish npm CLI
    needs: [build-binaries]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish API Docker Image ──────────────────────────────────────────────
  publish-api:
    name: Publish API Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/veilpass-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish Web Docker Image ───────────────────────────────────────────────
  publish-web:
    name: Publish Web Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/veilpass-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish Docs Docker Image ──────────────────────────────────────────────
  publish-docs:
    name: Publish Docs Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/veilpass-docs
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/docs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs:
      - build-binaries
      - publish-npm
      - publish-api
      - publish-web
      - publish-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: release_notes
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VeilPass ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.changelog }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
