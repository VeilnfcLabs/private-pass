# ─────────────────────────────────────────────────────────────────────────────
# VeilPass CI Pipeline
# Runs on push to main and on all pull requests.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust — Clippy + fmt
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Python — ruff + pylint
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python lint tools
        run: |
          pip install --upgrade pip
          pip install ruff pylint

      - name: Python lint (ruff)
        run: ruff check apps/api/ --line-length=100

      - name: Python lint (pylint)
        run: pylint apps/api/ --exit-zero --max-line-length=100

      # JavaScript/TypeScript — Biome
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Biome
        run: npm install -g @biomejs/biome

      - name: Biome lint & format
        run: biome check . --global-ignore

  # ── Test: API (Python/FastAPI) ─────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Test: Core (Rust library) ──────────────────────────────────────────────
  test-core:
    name: Test Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p veilpass-core --all-features --verbose

  # ── Test: CLI (npm) ────────────────────────────────────────────────────────
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build CLI
        run: npm run build

  # ── Build: Web (Next.js) ───────────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Build: Docs ────────────────────────────────────────────────────────────
  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

  # ── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cargo audit — known vulnerability scan for Rust deps
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

      # npm audit — known vulnerability scan for JS deps
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit (root)
        run: npm audit --audit-level=high || true

      - name: Run npm audit (web)
        run: cd apps/web && npm audit --audit-level=high || true

      - name: Run npm audit (cli)
        run: cd cli && npm audit --audit-level=high || true

      # Safety — Python dependency vulnerability scan
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety

      - name: Run safety check
        run: safety check -r apps/api/requirements.txt || true
